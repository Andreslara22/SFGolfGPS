name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle 8.5
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Build debug APK
        run: gradle :app:assembleDebug :wear:assembleDebug --no-daemon 2>&1 | tee build-output.log; exit ${PIPESTATUS[0]}

      # La llave de subida NO está en el repo (es público). Se reconstruye desde
      # los secretos del repo: Settings → Secrets and variables → Actions.
      - name: Preparar llave de firma
        if: ${{ secrets.SIGNING_KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_B64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
          KEYSTORE_PW: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_B64" | base64 -d > signing/sfgolf-release.keystore
          printf '%s' "$KEYSTORE_PW" > signing/release-password.txt

      - name: Build release AAB (Play Store)
        run: gradle :app:bundleRelease :wear:bundleRelease --no-daemon 2>&1 | tee -a build-output.log; exit ${PIPESTATUS[0]}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SFGolfGPS-debug-apk
          path: |
            app/build/outputs/apk/debug/app-debug.apk
            wear/build/outputs/apk/debug/wear-debug.apk

      - name: Upload AAB (Play Store)
        uses: actions/upload-artifact@v4
        with:
          name: SanFraGolf-release-aab
          path: |
            app/build/outputs/bundle/release/app-release.aab
            wear/build/outputs/bundle/release/wear-release.aab

      - name: Push error log on failure
        if: failure()
        run: |
          grep -E "e: |error:|FAILURE|What went wrong|Caused by" build-output.log | head -100 > build-error.log || true
          tail -n 60 build-output.log >> build-error.log
          git config user.name "build-bot"
          git config user.email "build-bot@users.noreply.github.com"
          git add -f build-error.log
          git commit -m "Log de error del build [skip ci]"
          git push
