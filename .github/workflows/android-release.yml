# Compila el Android App Bundle (.aab) FIRMADO de la app de teléfono, listo
# para subir a Google Play. Corre en Ubuntu (trae el Android SDK) y no
# necesita una Mac ni Android Studio local.
name: Android release (AAB)

on:
  push:
    branches: ["main", "claude/**"]
    paths:
      - "app/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle/**"
      - "signing/**"
      - ".github/workflows/android-release.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Configurar Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Compilar AAB de release (firmado con la upload key)
        run: ./gradlew :app:bundleRelease --no-daemon

      - name: Compilar APK de release (para probar por instalación directa)
        run: ./gradlew :app:assembleRelease --no-daemon

      - name: Renombrar artefactos
        run: |
          mkdir -p out
          cp app/build/outputs/bundle/release/app-release.aab out/SFGolfGPS-release.aab
          cp app/build/outputs/apk/release/app-release.apk out/SFGolfGPS-release.apk
          ls -lh out

      - name: Subir AAB (para Google Play)
        uses: actions/upload-artifact@v4
        with:
          name: SFGolfGPS-aab-google-play
          path: out/SFGolfGPS-release.aab
          retention-days: 30

      - name: Subir APK (para instalar directo y probar)
        uses: actions/upload-artifact@v4
        with:
          name: SFGolfGPS-apk
          path: out/SFGolfGPS-release.apk
          retention-days: 30
